<app-menu></app-menu>
<div id="main">
<div class="card shadow center">
  <div class="card-header"><span i18n>Environement variable</span></div>
	<div class="card-header shadow-sm">
    <button type="button" (click)="goToListVariable()" class="btn bg-gradient btn-primary btn-sm"><fa-icon [icon]="faXmark"></fa-icon>&nbsp;<span i18n>Back</span></button>
	</div>
	<div class="card-body">

		<div class="form-group row">
      <label class="col-sm-4 col-form-label col-form-label-sm label-nobr"><span i18n>Created on</span></label>
			<div class="col-sm-8">
				<input type="text" class="form-control form-control-sm field-separate" id="createdOn" name="createdOn" [(ngModel)]="variable.createdOn" disabled>
			</div>
		</div>

		<div class="form-group row">
      <label class="col-sm-4 col-form-label col-form-label-sm label-nobr"><span i18n>Updated on</span></label>
			<div class="col-sm-8">
        <input type="text" class="form-control form-control-sm field-separate" id="updatedOn" name="updatedOn" [(ngModel)]="variable.updatedOn" disabled>
			</div>
		</div>

		<div class="form-group row">
      <label class="col-sm-4 col-form-label col-form-label-sm label-nobr"><span i18n>Type</span></label>
			<div class="col-sm-8">
        <input type="text" class="form-control form-control-sm field-separate" id="family" name="family" [(ngModel)]="variable.family" disabled>
			</div>
		</div>

		<div class="form-group row">
      <label class="col-sm-4 col-form-label col-form-label-sm label-nobr"><span i18n>Key</span></label>
			<div class="col-sm-8">
				<input type="text" class="form-control form-control-sm field-separate" id="code" name="code" [(ngModel)]="variable.code" disabled>
			</div>
		</div>

		<div class="form-group row">
      <label class="col-sm-4 col-form-label col-form-label-sm label-nobr"><span i18n>Value</span></label>
			<div class="col-sm-8">
        <input type="text" class="form-control form-control-sm field-separate" id="content" name="content" [(ngModel)]="variable.content" disabled>
			</div>
		</div>

		<div class="form-group row">
      <label class="col-sm-4 col-form-label col-form-label-sm label-nobr"><span i18n>Notes</span></label>
			<div class="col-sm-8">
				<textarea rows="4" class="form-control form-control-sm field-separate" id="notes" name="notes" [(ngModel)]="variable.notes" disabled></textarea>
			</div>
		</div>


	</div>
	<div class="card-footer">
    <button type="button" (click)="updateVariable(variable.variableId)" class="btn bg-gradient btn-primary btn-sm"><fa-icon [icon]="faPen"></fa-icon>&nbsp;<span i18n>Edit</span></button>
	</div>
</div>
</div>
