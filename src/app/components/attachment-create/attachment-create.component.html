<app-menu></app-menu>
<div id="main">
<form #formRef="ngForm" (ngSubmit)="addProduction()" class="needs-validation">
	<div class="card shadow center">
		<div class="card-header"><span i18n>Add an attachment</span></div>
		<div class="card-header shadow-sm">
			<button (click)="goToAttachmentList()" class="btn bg-gradient btn-primary btn-sm"><fa-icon [icon]="faXmark"></fa-icon>&nbsp;<span i18n>Back</span></button>
		</div>
		<div class="card-body">

			<div class="form-group row">
				<label class="col-sm-4 col-form-label col-form-label-sm label-nobr"><span i18n>Public comments</span></label>
				<div class="col-sm-8">
					<textarea class="form-control form-control-sm field-separate" id="commentsPublic" name="commentsPublic" [(ngModel)]="attachment.commentsPublic"></textarea>
				</div>
			</div>

			<div class="form-group row">
				<label class="col-sm-4 col-form-label col-form-label-sm label-nobr"><span i18n>Private comments</span></label>
				<div class="col-sm-8">
					<textarea class="form-control form-control-sm field-separate" id="commentsPrivate" name="commentsPrivate" [(ngModel)]="attachment.commentsPrivate"></textarea>
				</div>
			</div>

			<div class="form-group row">
				<label class="col-sm-4 col-form-label col-form-label-sm label-nobr"><span i18n>Owner</span>&nbsp;<sup><span class="text-danger">*</span></sup></label>
				<div class="col-sm-8">
					<div class="form-group">
						<select class="form-select form-select-sm field-separate" id="ownerId" name="ownerId" [(ngModel)]="attachment.ownerId" required>
						@for (user of users; track user.userId) {
							<option [ngValue]="user.userId">{{ user.nickName }}</option>
				    }
						</select>
					</div>
				</div>
			</div>

			<div class="form-group row">
				<label class="col-sm-4 col-form-label col-form-label-sm label-nobr"><span i18n>Archive</span></label>
				<div class="col-sm-8">
					<input type="file" class="form-control form-control-sm field-separate" id="archive" name="archive" accept="application/zip" (change)="onArchiveSelected($event)">
					<div class="form-text field-separate"><span i18n>The archive size is limited to 1 GB.</span></div>
				</div>
			</div>

		</div>
		<div class="card-footer hstack">
			<button type="button" class="btn bg-gradient btn-success btn-sm text-left" #uploadButton type="submit" [disabled]="formRef.invalid"><fa-icon [icon]="faPlus"></fa-icon>&nbsp;<span i18n>Add</span></button>
			<div #labelMessage class="form-text" style="padding-left:10px;min-width:300px;"></div>
		</div>
	</div>
</form>
</div>
